# lark-deck-cyrus · machine-readable workflow
# This preserves the original feishu-deck-h5 pipeline contract while pointing
# scheduler/harness integrations at the Cyrus skill names and executable paths.

name: lark-deck-cyrus
version: "1.0.0"
description: 飞书 / Lark HTML Deck 全流程治理 - 从 brief / 上传物到 H5 交付与复用入库

depends:
  - skill: upload-parser
    required: false
  - skill: deck-planner
    required: true
  - skill: deck-renderer
    required: true
  - skill: deck-auditor
    required: true
  - skill: pitch-simulator
    required: false
  - skill: deck-ingestor
    required: false

compatibility:
  historical_runs_policy: immutable
  preflight_modes: [ok, bootstrapped]
  validate_defaults:
    strict_default: false
    visual_default: false
  delivery_defaults:
    delivery_shape: inline
    shared_assets_mode: copy
    editable_zip_when_remote: true
  visual_standards:
    title_logo_horizontal_lock:
      enabled: true
      applies_when:
        - "user explicitly requests title and Feishu logo horizontal alignment"
        - "content page shows both main title and .wordmark in the top header area"
      required_structure:
        - "header contains only title container and wordmark"
        - "subtitle must be outside the header row"
        - "header must be position: relative"
        - "wordmark must be position: absolute inside header"
        - "header must reserve fixed right space for the logo"
      logo_box:
        width: 160
        height: 50
        top: -2
        right: 4
      header_padding_right: 196
      forbidden_fixes:
        - "align logo with a title+subtitle flex block"
        - "keep subtitle in header and iterate margin-top repeatedly"
        - "shrink title width without reserving explicit logo space"
  local_tooling:
    preflight: skills/deck-renderer/assets/preflight.sh
    new_run: skills/deck-renderer/assets/new-run.sh
    compile_outline: skills/deck-renderer/deck-json/compile-outline.py
    render_deck: skills/deck-renderer/deck-json/render-deck.py
    validate_html: skills/deck-renderer/assets/validate.py
    extract_texts: skills/deck-renderer/assets/extract-texts.py
    copy_assets: skills/deck-renderer/assets/copy-assets.py
    finalize: skills/deck-renderer/assets/finalize.sh
    package_deliverable: skills/deck-renderer/assets/package-deliverable.sh
    inline_assets: skills/deck-renderer/assets/inline-assets.py
    deck_edit: skills/deck-renderer/assets/deck-edit.py
    deck_manage: skills/deck-renderer/assets/deck-manage.py
    deck_screenshot: skills/deck-renderer/assets/deck-screenshot.py
    base_library: scripts/base_library.py
    ingest: skills/deck-ingestor/ingest.py

stages:
  - id: S0
    name: 需求分流
    human_confirm: false
    tasks:
      - id: T0.1
        name: 判断入口场景
        type: agent-decision
        decision: entry-scenario
        options: [audit-existing-html, brief-only-new-deck, brief-plus-materials]
      - id: T0.2
        name: 判断是否需要上传解析
        type: agent-decision
        decision: parser-needed
        options: [yes, no]

  - id: S1
    name: 上传解析
    human_confirm: false
    condition: "entry-scenario == brief-plus-materials"
    tasks:
      - id: T1.1
        name: 生成 source dossier
        type: skill
        invoke: upload-parser
        produces:
          - path: "runs/{{ timestamp }}/input/runtime-library/source-dossier.json"
            type: file

  - id: S2
    name: 规划讲法
    human_confirm: true
    tasks:
      - id: T2.1
        name: 生成 outline
        type: skill
        invoke: deck-planner
        consumes:
          - "{{ brief }}"
          - "{{ source_dossier }}"
        produces:
          - path: "runs/{{ timestamp }}/input/outline.json"
            type: file
      - id: T2.2
        name: 确认页级设计方案
        type: human-confirm
        prompt: "确认每页角色、重点、layout candidate 和是否需要 raw / replica / iframe-embed"
        requires_confirm: true

  - id: S3
    name: H5 生产
    human_confirm: false
    tasks:
      - id: T3.1
        name: 运行 preflight
        type: script
        invoke: skills/deck-renderer/assets/preflight.sh
        exit_on_fail: true
      - id: T3.2
        name: 创建 run workspace
        type: script
        invoke: skills/deck-renderer/assets/new-run.sh
        args: ["{{ slug }}"]
        produces:
          - path: "runs/{{ timestamp }}/{input,output}/"
            type: directory
      - id: T3.3
        name: 编译 outline 为 DeckJSON
        type: script
        invoke: skills/deck-renderer/deck-json/compile-outline.py
        args: ["{{ outline_json }}", "{{ output_dir }}/deck.json", "--report", "{{ output_dir }}/FEEDBACK.md"]
        condition: "outline_json != ''"
        produces:
          - path: "runs/{{ timestamp }}/output/deck.json"
            type: file
      - id: T3.4
        name: 落地飞书文件素材
        type: script
        invoke: skills/deck-renderer/deck-json/materialize-feishu-assets.py
        args: ["{{ deck_json }}", "{{ output_dir }}", "--source-dossier", "{{ source_dossier }}", "--fail-on-unresolved"]
        produces:
          - path: "runs/{{ timestamp }}/output/assets/source-media/"
            type: directory
        condition: "deck_json != ''"
      - id: T3.5
        name: 渲染 H5 deck
        type: script
        invoke: skills/deck-renderer/deck-json/render-deck.py
        args: ["{{ deck_json }}", "{{ output_dir }}"]
        produces:
          - path: "runs/{{ timestamp }}/output/index.html"
            type: file
          - path: "runs/{{ timestamp }}/output/texts.md"
            type: file

  - id: S4
    name: 质量验收
    human_confirm: false
    tasks:
      - id: T4.1
        name: 运行 deck-auditor 验收
        type: skill
        invoke: deck-auditor
        args: ["{{ html_path }}", "--deck-json", "{{ deck_json }}"]
        max_retries: 3
        produces:
          - path: "runs/{{ timestamp }}/output/AUDIT_REPORT.md"
            type: file
          - path: "runs/{{ timestamp }}/output/audit-report.json"
            type: file

  - id: S5
    name: 预演发布门禁
    human_confirm: false
    tasks:
      - id: T5.1
        name: 生成 pitch rehearsal
        type: skill
        invoke: pitch-simulator
        condition: "auditor_verdict == passed"
        produces:
          - path: "runs/{{ timestamp }}/output/pitch-rehearsal.json"
            type: file
      - id: T5.2
        name: 执行 rehearsal gate
        type: script
        invoke: scripts/run_cyrus_pipeline.py::evaluate_rehearsal_gate
        condition: "auditor_verdict == passed"
        exit_on_fail: true
        produces:
          - path: "runs/{{ timestamp }}/output/REHEARSAL_GATE.md"
            type: file

  - id: S6
    name: deck 发布与迭代
    human_confirm: true
    tasks:
      - id: T6.1
        name: 生成 inline 单文件
        type: script
        invoke: skills/deck-renderer/deck-json/render-deck.py
        args: ["{{ deck_json }}", "{{ output_dir }}", "--inline"]
        condition: "delivery-shape == inline and rehearsal_gate == passed and deck_json != ''"
      - id: T6.2
        name: 发布到飞书妙笔云端 HTML 页面
        type: skill
        invoke: publish-magic-page
        condition: "rehearsal_gate == passed and publish_target in ['', 'magic-page']"
        produces:
          - path: "runs/{{ timestamp }}/output/CLOUD_PUBLISH.md"
            type: file
          - path: "runs/{{ timestamp }}/output/MAGIC_PAGE_PUBLISH.md"
            type: file
      - id: T6.3
        name: legacy 发布到飞书妙笔文档 HTML Box
        type: skill
        invoke: generate-magic-doc
        condition: "rehearsal_gate == passed and publish_target == 'magic-doc'"
      - id: T6.4
        name: 生成可编辑 zip
        type: script
        invoke: skills/deck-renderer/assets/package-deliverable.sh
        args: ["{{ output_dir }}"]
        condition: "delivery-shape == editable-zip"
      - id: T6.5
        name: 用户确认是否采用预演改稿
        type: human-confirm
        prompt: "预演建议是否进入下一轮 deck-planner / deck-renderer 迭代?"

  - id: S7
    name: 入库复用
    human_confirm: true
    tasks:
      - id: T7.1
        name: 写入本地候选库
        type: script
        invoke: skills/deck-ingestor/ingest.py
        args: ["--task-id", "{{ task_id }}", "--title", "{{ title }}", "--contributor", "{{ contributor }}", "--contributed-at", "{{ now_iso }}"]
        condition: "auditor_verdict == passed and user_confirmed_ingestion == true"
        produces:
          - path: "runs/{{ timestamp }}/output/ingestion-manifest.json"
            type: file
          - path: "runs/{{ timestamp }}/output/INGESTION_REPORT.md"
            type: file
      - id: T7.2
        name: 可选写入飞书 Base 知识库/素材库
        type: script
        invoke: skills/deck-ingestor/ingest.py
        args: ["--task-id", "{{ task_id }}", "--title", "{{ title }}", "--write-base", "--contributor", "{{ contributor }}", "--contributed-at", "{{ now_iso }}"]
        condition: "auditor_verdict == passed and user_confirmed_ingestion == true and write_base == true"

extension_points:
  - id: EP-PDF
    stage: S1
    description: "PDF / PPT 解析可由 upload-parser 的专用实现接管"
    candidate_skills: [upload-parser]
  - id: EP-EXPORT
    stage: S5
    description: "需要 PDF / PPTX / URL 时在交付层扩展,不绕过 H5 validator"
    candidate_skills: [pdf-export, pptx-export, hosted-url]
