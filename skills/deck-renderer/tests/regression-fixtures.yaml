  # ===== ctg · big-deck visual audit unblock =====
  # Before 2026-05-24, Playwright page.goto(networkidle, 10s) timed
  # out on ctg's 53-slide deck → R-VISUAL warning, 0 R-VIS-* hits.
  # After bumping to (load, 60s), all R-VIS-* audits run. Use ctg's
  # LABEL-FLOOR count > 0 as a sentinel that the audit infra still
  # works on big decks.
  - id: ctg-visual-audit-runs-at-all
    deck: runs/20260514-191808-ctg/output/index.html
    slide: 4
    audit: R-VIS-LABEL-FLOOR
    type: must_fire
    selector_hint: vs-cell
    notes: |
      If ctg returns 0 R-VIS-LABEL-FLOOR hits, the visual audit likely
      timed out / failed silently (regression on the 2026-05-24
      Playwright timeout fix). The audit infra is broken, not the
      LABEL-FLOOR rule. Investigate page.goto / Playwright before
      blaming the rule.
