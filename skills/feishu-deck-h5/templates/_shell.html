<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>〔Deck title〕 · Lark Suite</title>

  <!-- Option A: link the stylesheet (relative path) -->
  <link rel="stylesheet" href="../assets/feishu-deck.css">
  <!-- Option B (recommended for delivery): inline the contents of feishu-deck.css here -->
  <!-- <style>/* paste feishu-deck.css */</style> -->
</head>
<body>

  <div class="deck">

    <!-- 01 · Cover (master 封面) -->
    <div class="slide-frame">
      <div class="slide" data-layout="cover" data-screen-label="01 Cover">
        <div class="wordmark">飞书</div>
        <div class="stage">
          <h1 class="title">〔主标题<br>第二行〕</h1>
          <p class="subtitle">〔English subtitle — short and direct〕</p>
        </div>
        <div class="author">
          <span class="role">〔议题类型 · 日期〕</span>〔团队 / 公司名〕
        </div>
      </div>
    </div>

    <!-- 02 · Section divider (master 一级章节页) -->
    <div class="slide-frame">
      <div class="slide" data-layout="section" data-screen-label="02 Section">
        <div class="wordmark">飞书</div>
        <div class="chapter-num">01.</div>
        <h2 class="title">〔章节标题〕</h2>
        <p class="lede">〔副标题 · 一句话点题〕</p>
        <div class="footer"><span>〔Brand line · 客户名〕</span><span class="pageno">02</span></div>
      </div>
    </div>

    <!-- 〔add more <div class="slide-frame"> blocks here from templates/slide-recipes.html〕 -->

  </div>

  <!-- Option A: link the runtime -->
  <script src="../assets/feishu-deck.js"></script>
  <!-- Option B (recommended): inline the contents of feishu-deck.js here -->
  <!-- <script>/* paste feishu-deck.js */</script> -->
</body>
</html>
